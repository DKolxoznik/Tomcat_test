<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый сайт на Tomcat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Даниил</h1>
    </header>

    <main>
        <section class="bio">
            <h2>Обо мне</h2>
            <p>
                Привет! Я учусь в IThub на кафедре ПиУП.
                Это моя первая страница, размещённая на веб-сервере.
                В будущем планирую развиваться в направлении... А я сам не знаю)
            </p>
        </section>

        <section class="hobbies">
            <h2>Мои хобби</h2>
            <ul>
                <li>Программирование</li>
                <li>Коммуникация</li>
                <li>Психология</li>
                <li>Путешествия</li>
            </ul>
        </section>

        <section class="contact-form">
            <h2>Обратная связь</h2>
            <form id="feedback-form">
                <label for="name">Имя:</label>
                <input type="text" id="name" name="name" required placeholder="Введите имя">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.ru">

                <label for="message">Сообщение:</label>
                <textarea id="message" name="message" rows="4" required placeholder="Напишите сообщение..."></textarea>

                <button type="submit">Отправить</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
